name: PR Verify

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Clerk auth env for the e2e suite (issue #27). These are the Development
    # instance keys, stored as GitHub Actions secrets. They are empty until
    # configured, and the app does not use Clerk yet, so this is a no-op until
    # #27 lands. CLERK_TESTING_TOKEN (for @clerk/testing) is added there too.
    env:
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Turborepo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browser (Chrome)
        run: npx playwright install --with-deps chrome

      - name: Run verification gate
        run: ./scripts/verify.sh
